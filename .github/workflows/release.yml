name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
            ext: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            platform: linux-aarch64
            ext: tar.gz
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: darwin-x86_64
            ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: darwin-aarch64
            ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
            ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.cross == true
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build binaries
        run: |
          cargo build --release --target ${{ matrix.target }} --package ormdb-cli
          cargo build --release --target ${{ matrix.target }} --package ormdb-server
          cargo build --release --target ${{ matrix.target }} --package ormdb-gateway
          cargo build --release --target ${{ matrix.target }} --package ormdb-studio

      - name: Prepare artifacts (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/ormdb dist/
          cp target/${{ matrix.target }}/release/ormdb-server dist/
          cp target/${{ matrix.target }}/release/ormdb-gateway dist/
          cp target/${{ matrix.target }}/release/ormdb-studio dist/
          chmod +x dist/*
          cd dist
          tar -czvf ../ormdb-${{ github.ref_name }}-${{ matrix.platform }}.tar.gz *

      - name: Prepare artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/${{ matrix.target }}/release/ormdb.exe dist/
          Copy-Item target/${{ matrix.target }}/release/ormdb-server.exe dist/
          Copy-Item target/${{ matrix.target }}/release/ormdb-gateway.exe dist/
          Copy-Item target/${{ matrix.target }}/release/ormdb-studio.exe dist/
          Compress-Archive -Path dist/* -DestinationPath ormdb-${{ github.ref_name }}-${{ matrix.platform }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ormdb-${{ matrix.platform }}
          path: ormdb-${{ github.ref_name }}-${{ matrix.platform }}.${{ matrix.ext }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifacts
        run: ls -R artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          for dir in */; do
            for file in "$dir"*; do
              if [[ -f "$file" ]]; then
                sha256sum "$file" >> checksums.txt
              fi
            done
          done
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            artifacts/ormdb-*/*
            artifacts/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          CRATES=("ormdb-proto" "ormdb-lang" "ormdb-core" "ormdb-client" "ormdb-server" "ormdb-cli" "ormdb-gateway" "ormdb-studio")

          for crate in "${CRATES[@]}"; do
            echo "Publishing: $crate"
            cd crates/$crate
            cargo publish --token $CARGO_REGISTRY_TOKEN || echo "Failed to publish $crate (may already exist)"
            cd ../..
            echo "Waiting 30s for crates.io indexing..."
            sleep 30
          done
